workflows:
  ios-app-store:
    name: Hoop Keys iOS App Store
    max_build_duration: 120
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.omergames.hoopkeys
      groups:
        - firebase_ios
      vars:
        BUNDLE_ID: com.omergames.hoopkeys
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Restore iOS Firebase config
        script: |
          if [ -n "$IOS_FIREBASE_PLIST_B64" ]; then
            echo "$IOS_FIREBASE_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist || \
            echo "$IOS_FIREBASE_PLIST_B64" | base64 -D > ios/Runner/GoogleService-Info.plist
          fi
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Missing ios/Runner/GoogleService-Info.plist. Add IOS_FIREBASE_PLIST_B64 to the firebase_ios variable group."
            exit 1
          fi
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up signing certificate
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find ios -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter tests
        script: |
          flutter test
      - name: Build signed IPA
        script: |
          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-1}
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
